<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>404 - Access Interrupted</title>
  <style>
    :root {
      --primary: #10b981; /* Emerald */
      --bg-base: #020617; 
      --card-bg: rgba(7, 10, 15, 0.95); 
      --text-main: #f8fafc;
      --text-muted: #64748b;
      --border: rgba(255, 255, 255, 0.05);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-base) url('background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .overlay {
      background: radial-gradient(circle at center, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.95) 100%);
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      padding: 50px 40px;
      width: 100%;
      max-width: 380px;
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9);
      text-align: center;
      box-sizing: border-box;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(239, 68, 68, 0.1); /* Subtle Red for error */
      color: #ef4444;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
      border: 1px solid rgba(239, 68, 68, 0.1);
    }

    .error-code {
      font-size: 72px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(180deg, #ffffff 0%, #64748b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      margin: 10px 0 8px 0;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 30px;
    }

    /* SLIM PILL BUTTON */
    .btn-return {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 24px;
      border-radius: 50px;
      border: 1px solid var(--primary);
      background: #ffffff;
      color: var(--primary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      width: 100%;
      box-sizing: border-box;
    }

    .btn-return:hover {
      background: var(--primary);
      color: #ffffff;
      transform: translateY(-1px);
      box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.3);
    }

    .footer-note {
      margin-top: 30px;
      font-size: 10px;
      color: var(--text-muted);
      opacity: 0.5;
    }
  </style>
</head>
<body>

<div class="overlay">
  <div class="container">
    <div class="status-badge">Error Detected</div>
    
    <div class="error-code">404</div>
    
    <h2>Page Not Found</h2>
    <p>The requested resource is unavailable or the link has expired. Please return to the main dashboard.</p>
    
    <a href="https://github.io" class="btn-return">Return to Dashboard</a>
    
    <div class="footer-note">
      Secure System Gateway v2.4
    </div>
  </div>
</div>

</body>
</html>
